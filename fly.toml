# fly.toml — BataDB on Fly.io
#
# This is a stateful TCP service (not HTTP). One machine, one persistent volume.
# Scaling out would require sharding/replication which is out of scope for the MVP.

app = "zvndev-batadb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  BATADB_DATA = "/data"
  BATADB_PORT = "5433"

# Mount the persistent volume at /data so the database survives machine recycles.
[mounts]
  source = "batadb_data"
  destination = "/data"
  initial_size = "1gb"

# Raw TCP service on port 5433. No HTTP, no TLS termination — clients speak the
# native wire protocol directly.
[[services]]
  protocol = "tcp"
  internal_port = 5433
  auto_stop_machines = false   # database — stay up
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 5433

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
