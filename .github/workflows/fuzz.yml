name: fuzz

on:
  pull_request:
    paths:
      - "crates/query/src/lexer.rs"
      - "crates/query/src/parser.rs"
      - "crates/query/src/token.rs"
      - "crates/query/src/canonicalize.rs"
      - "crates/query/fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Nightly smoke at 07:00 UTC — longer budget than PR runs.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz-smoke:
    name: fuzz ${{ matrix.target }} (${{ matrix.budget }}s)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Informational for now: fuzz surfaces findings but does not block merges
    # until we've triaged the existing baseline crashes (tracked in issues).
    # Flip to blocking once the targets run clean for a week on main.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_lexer, fuzz_parser, fuzz_roundtrip]
        include:
          - target: fuzz_lexer
            budget: 60
          - target: fuzz_parser
            budget: 60
          - target: fuzz_roundtrip
            budget: 60
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/query/fuzz/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('crates/query/fuzz/Cargo.lock') }}
          restore-keys: |
            fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # `cargo fuzz` expects `<crate>/fuzz/Cargo.toml` relative to its cwd,
      # so we run from `crates/query` (the crate under test), not from
      # `crates/query/fuzz` itself.
      - name: Run ${{ matrix.target }} for ${{ matrix.budget }}s
        working-directory: crates/query
        run: |
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ matrix.budget }} \
            -timeout=5 \
            -max_len=2048 \
            -print_final_stats=1

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: crates/query/fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14
