name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: clippy + fmt + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # x86-64-v2 is only valid on Linux x86_64 runners; ARM Macs need the
      # default target-cpu. The conditional step below sets RUSTFLAGS for
      # ubuntu only.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set RUSTFLAGS (Linux)
        if: runner.os == 'Linux'
        run: echo "RUSTFLAGS=-C target-cpu=x86-64-v2" >> "$GITHUB_ENV"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ci-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace
