name: bench

# PowDB regression gate. Runs the criterion suite on every PR to main and on
# pushes to main. Comparator exits non-zero on regression beyond the gate
# thresholds (7% per-workload absolute, 2.5x ratio ceiling on the thesis
# metric).
#
# See docs/superpowers/specs/2026-04-07-bench-regression-gate-design.md
# and the "Bench regression gate" section of AGENTS.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands. Bench
# runs are expensive and the older one's results would be wasted anyway.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: criterion + regression gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      # Override `.cargo/config.toml`'s `-C target-cpu=native` with a
      # portable x86-64-v2 baseline (SSE3/SSSE3/SSE4.1/SSE4.2/POPCNT).
      # GitHub Actions `ubuntu-24.04` runners are a heterogeneous pool of
      # Azure VMs with different host CPUs. `target-cpu=native` bakes
      # host-specific instructions (up to AVX-512 on Sapphire Rapids) into
      # the binary, which then SIGILLs when cargo's cache serves that
      # binary to a subsequent job running on an older CPU. `x86-64-v2`
      # is the widest baseline that still lets crc32fast use its SSE4.2
      # SIMD path (runtime-detected), so there's no perf floor lost on
      # the WAL path.
      RUSTFLAGS: "-C target-cpu=x86-64-v2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Cache key is suffixed `-v2` to bust any stale `target/` built
          # under `target-cpu=native` on a previous runner — the old cache
          # contained a binary with AVX-512 instructions that crashed on
          # Skylake-era runners (see SIGILL on run 24210833296).
          key: bench-${{ runner.os }}-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-v2-

      - name: Print rustc version
        run: rustc --version

      - name: Build bench targets
        run: cargo bench -p powdb-bench --no-run

      - name: Run criterion bench suite
        run: cargo bench -p powdb-bench --quiet

      - name: Run regression gate comparator
        run: cargo run -p powdb-bench --bin compare --quiet

      - name: Upload criterion estimates on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-estimates
          path: target/criterion/*/new/estimates.json
          retention-days: 14
